name: Build Packages

on:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "yolo_viewer/**"
      - "requirements*.txt"
      - "scripts/**"
      - ".github/workflows/build-packages.yml"
  pull_request:
    branches:
      - main
    paths:
      - "main.py"
      - "yolo_viewer/**"
      - "requirements*.txt"
      - "scripts/**"
      - ".github/workflows/build-packages.yml"
  workflow_dispatch:
    inputs:
      build_full:
        description: "Build full package (includes model deps)"
        required: false
        default: false
        type: boolean
      build_macos:
        description: "Build macOS lite package"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lite.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

  build_windows_lite:
    needs: tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build lite onedir package
        shell: pwsh
        run: ./scripts/build_windows_lite.ps1 -OneDir

      - name: Verify runtime files
        shell: pwsh
        run: |
          $required = @(
            "dist/yolo-viewer-lite/yolo-viewer-lite.exe",
            "dist/yolo-viewer-lite/python310.dll",
            "dist/yolo-viewer-lite/vcruntime140.dll",
            "dist/yolo-viewer-lite/vcruntime140_1.dll",
          )
          foreach ($f in $required) {
            if (-not (Test-Path -LiteralPath $f)) {
              throw "Missing runtime file: $f"
            }
          }

      - name: Smoke run packaged app
        shell: pwsh
        run: |
          $exe = Resolve-Path "dist/yolo-viewer-lite/yolo-viewer-lite.exe"
          $p = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 8
          if ($p.HasExited) {
            if ($p.ExitCode -ne 0) {
              throw "Packaged app exited early with code $($p.ExitCode)"
            }
          } else {
            Stop-Process -Id $p.Id -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo-viewer-lite-windows-${{ github.sha }}
          path: dist/yolo-viewer-lite/
          if-no-files-found: error
          retention-days: 14

  build_windows_full:
    needs: tests
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_full }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build full onedir package
        shell: pwsh
        run: ./scripts/build_windows_full.ps1 -OneDir

      - name: Verify runtime files
        shell: pwsh
        run: |
          $required = @(
            "dist/yolo-viewer-full/yolo-viewer-full.exe",
            "dist/yolo-viewer-full/python310.dll",
            "dist/yolo-viewer-full/vcruntime140.dll",
            "dist/yolo-viewer-full/vcruntime140_1.dll",
          )
          foreach ($f in $required) {
            if (-not (Test-Path -LiteralPath $f)) {
              throw "Missing runtime file: $f"
            }
          }

      - name: Smoke run packaged app
        shell: pwsh
        run: |
          $exe = Resolve-Path "dist/yolo-viewer-full/yolo-viewer-full.exe"
          $p = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 8
          if ($p.HasExited) {
            if ($p.ExitCode -ne 0) {
              throw "Packaged app exited early with code $($p.ExitCode)"
            }
          } else {
            Stop-Process -Id $p.Id -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo-viewer-full-windows-${{ github.sha }}
          path: dist/yolo-viewer-full/
          if-no-files-found: error
          retention-days: 14

  build_macos_lite:
    needs: tests
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_macos }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build lite onedir package
        run: |
          chmod +x ./scripts/build_macos_lite.sh
          ./scripts/build_macos_lite.sh --onedir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo-viewer-lite-macos-${{ github.sha }}
          path: dist/yolo-viewer-lite/
          if-no-files-found: error
          retention-days: 14

